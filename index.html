<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Do you love me?</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: radial-gradient(circle, #ff4da6, #6a00ff);
}

/* title */
h1 {
  text-align: center;
  color: white;
  margin-top: 30px;
  text-shadow: 0 0 20px white;
}

/* buttons */
button {
  padding: 15px 25px;
  border: none;
  border-radius: 30px;
  font-size: 18px;
  cursor: pointer;
}

#yes {
  display: block;
  margin: 30px auto;
  background: white;
  color: hotpink;
  box-shadow: 0 0 20px white;
}

#no {
  position: absolute;
  background: black;
  color: white;
}

/* hearts */
.heart {
  position: absolute;
  font-size: 25px;
  animation: fall 4s linear forwards;
}

@keyframes fall {
  from {transform: translateY(-50px);}
  to {transform: translateY(110vh);}
}

/* cat */
#cat {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 120px;
  border-radius: 20px;
  box-shadow: 0 0 20px white;
}

/* message */
#msg {
  text-align: center;
  color: white;
  font-size: 22px;
  margin-top: 10px;
  text-shadow: 0 0 10px white;
}
</style>
</head>

<body>

<h1>Do you love me? 💖</h1>

<div id="msg">YES or NO 😳</div>

<button id="yes">YES 💕</button>
<button id="no">NO ❌</button>

<!-- CAT IMAGE -->
<img id="cat" src="https://placekitten.com/200/200" />

<!-- MUSIC -->
<div style="position:absolute; top:-100px;">
<iframe width="0" height="0"
src="https://www.youtube.com/embed/h5oHhGlWKf0?autoplay=1&loop=1&playlist=h5oHhGlWKf0"
allow="autoplay">
</iframe>
</div>

<script>

const noBtn = document.getElementById("no");
const msg = document.getElementById("msg");

// ❌ NO button cannot be touched
function moveNo() {
  noBtn.style.left = Math.random() * (window.innerWidth - 120) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 120) + "px";
}

noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("click", moveNo);

// 💕 YES button action
document.getElementById("yes").onclick = () => {
  msg.innerHTML = "AWWW BABEEE I LOVE YOU TO!!! 💖💖💖🐱✨";
};

// 💖 hearts everywhere
function spawnHeart() {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";

  h.style.left = Math.random() * window.innerWidth + "px";
  h.style.fontSize = (20 + Math.random() * 25) + "px";

  document.body.appendChild(h);

  setTimeout(() => h.remove(), 4000);
}

setInterval(spawnHeart, 200);

</script>

</body>
</html>
