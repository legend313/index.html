<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ultimate Cute Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: linear-gradient(-45deg, #ff4d6d, #ffb3c6, #ff69b4, #ff85a2);
  background-size: 400% 400%;
  animation: bg 10s ease infinite;
}

@keyframes bg {
  0% {background-position:0% 50%}
  50% {background-position:100% 50%}
  100% {background-position:0% 50%}
}

h1 {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 20px;
  color: white;
  text-shadow: 0 0 15px #fff;
}

#score {
  position: absolute;
  top: 70px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 20px;
}

button {
  position: absolute;
  padding: 15px 25px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-size: 16px;
  box-shadow: 0 0 15px white;
}

#no {
  background: black;
  color: white;
}

#yes {
  left: 50%;
  transform: translateX(-50%);
  bottom: 40px;
  background: white;
  color: hotpink;
  font-size: 18px;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}
</style>
</head>

<body>

<h1>Catch the Hearts 💖</h1>
<div id="score">Score: 0</div>

<button id="no">NO ❌</button>
<button id="yes">YES 💖</button>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];
let score = 0;

class Heart {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = -20;
    this.size = 20 + Math.random() * 20;
    this.speed = 2 + Math.random() * 3;
    this.char = Math.random() > 0.5 ? "💖" : "🐱";
  }
  update() {
    this.y += this.speed;
  }
  draw() {
    ctx.font = this.size + "px Arial";
    ctx.fillText(this.char, this.x, this.y);
  }
}

function spawn() {
  hearts.push(new Heart());
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  hearts.forEach((h, i) => {
    h.update();
    h.draw();

    if (h.y > canvas.height) hearts.splice(i, 1);
  });

  requestAnimationFrame(loop);
}

setInterval(spawn, 250);
loop();

// click to catch
canvas.addEventListener("click", (e) => {
  hearts.forEach((h, i) => {
    const dx = e.clientX - h.x;
    const dy = e.clientY - h.y;
    if (Math.sqrt(dx*dx + dy*dy) < 30) {
      hearts.splice(i, 1);
      score++;
      document.getElementById("score").innerText = "Score: " + score;

      if (score === 20) {
        alert("You win 💖 You caught all the love!");
      }
    }
  });
});

// runaway NO button
const noBtn = document.getElementById("no");

function moveNo() {
  noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 100) + "px";
}

noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("click", moveNo);

// YES button
document.getElementById("yes").onclick = () => {
  alert("You chose YES 💖");
};
</script>

</body>
</html>
