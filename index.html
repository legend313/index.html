<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Neon Love Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: linear-gradient(270deg, #ff4da6, #7a00ff, #00e5ff);
  background-size: 600% 600%;
  animation: bg 10s ease infinite;
}

@keyframes bg {
  0% {background-position:0% 50%}
  50% {background-position:100% 50%}
  100% {background-position:0% 50%}
}

h1 {
  text-align: center;
  color: white;
  margin-top: 30px;
  text-shadow: 0 0 15px #fff;
}

#score {
  text-align: center;
  color: white;
  font-size: 20px;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

#yes {
  display: block;
  margin: 20px auto;
  background: white;
  color: hotpink;
  font-size: 18px;
}

#no {
  position: absolute;
  background: black;
  color: white;
}

.heart {
  position: absolute;
  font-size: 24px;
  animation: fall 4s linear forwards;
}

@keyframes fall {
  from {transform: translateY(-50px);}
  to {transform: translateY(110vh);}
}

.cat {
  position: absolute;
  font-size: 35px;
}
</style>
</head>

<body>

<h1>Catch Hearts 💖 & Enjoy Music 🎵</h1>
<div id="score">Score: 0</div>

<button id="yes">START 💖</button>
<button id="no">NO ❌</button>

<script>
// ---------------- MUSIC (Web Audio API) ----------------
let audioCtx;
function startMusic() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const notes = [261, 329, 392, 523]; // simple melody
  let i = 0;

  setInterval(() => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.frequency.value = notes[i % notes.length];
    osc.type = "sine";

    gain.gain.value = 0.05;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);

    i++;
  }, 250);
}

// ---------------- GAME ----------------
let score = 0;
document.getElementById("score");

document.getElementById("yes").onclick = () => {
  startMusic();
  alert("Music started 💖 Catch hearts!");
};

// runaway button
const noBtn = document.getElementById("no");

function moveNo() {
  noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 100) + "px";
}
noBtn.addEventListener("mouseover", moveNo);

// hearts
function spawnHeart() {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";

  h.style.left = Math.random() * window.innerWidth + "px";
  h.style.fontSize = (20 + Math.random() * 20) + "px";

  document.body.appendChild(h);

  h.onclick = () => {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
    h.remove();
  };

  setTimeout(() => h.remove(), 4000);
}
setInterval(spawnHeart, 300);

// cats
function spawnCat() {
  const c = document.createElement("div");
  c.className = "cat";
  c.innerHTML = "🐱";
  c.style.left = Math.random() * window.innerWidth + "px";
  c.style.top = Math.random() * window.innerHeight + "px";

  document.body.appendChild(c);
  setTimeout(() => c.remove(), 2000);
}
setInterval(spawnCat, 1200);
</script>

</body>
</html>
