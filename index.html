<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Neon Love 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;

  background: linear-gradient(270deg, #ff4da6, #7a00ff, #00e5ff);
  background-size: 600% 600%;
  animation: bg 10s ease infinite;
}

@keyframes bg {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

h1 {
  text-align: center;
  color: white;
  margin-top: 40px;
  text-shadow: 0 0 15px white;
}

#msg {
  text-align: center;
  color: white;
  font-size: 20px;
  margin-top: 10px;
}

button {
  padding: 15px 25px;
  border: none;
  border-radius: 30px;
  font-size: 18px;
  cursor: pointer;
}

#yes {
  display: block;
  margin: 30px auto;
  background: white;
  color: hotpink;
}

#no {
  position: absolute;
  background: black;
  color: white;
}

.heart {
  position: absolute;
  font-size: 24px;
  animation: fall 4s linear forwards;
}

@keyframes fall {
  from { transform: translateY(-50px); }
  to { transform: translateY(110vh); }
}

.cat {
  position: absolute;
  font-size: 40px;
}
</style>
</head>

<body>

<h1>Do you love me? 💖</h1>
<div id="msg">YES or NO 😳</div>

<button id="yes">YES 💕</button>
<button id="no">NO ❌</button>

<script>
const noBtn = document.getElementById("no");
const msg = document.getElementById("msg");

noBtn.addEventListener("mouseover", () => {
  noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 100) + "px";
});

document.getElementById("yes").onclick = () => {
  msg.innerHTML = "AWWW BABEEE I LOVE YOU TO!!! 💖🐱✨";
};

// hearts
setInterval(() => {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";
  h.style.left = Math.random() * window.innerWidth + "px";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 4000);
}, 200);

// cats
setInterval(() => {
  const c = document.createElement("div");
  c.className = "cat";
  c.innerHTML = "🐱";
  c.style.left = Math.random() * window.innerWidth + "px";
  c.style.top = Math.random() * window.innerHeight + "px";
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 2000);
}, 1200);

</script>

</body>
</html>
