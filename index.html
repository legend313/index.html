<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Neon Love Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;

  background: linear-gradient(270deg, #ff4da6, #7a00ff, #00e5ff);
  background-size: 600% 600%;
  animation: bg 10s ease infinite;
}

/* background animation */
@keyframes bg {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* title */
h1 {
  text-align: center;
  color: white;
  margin-top: 40px;
  text-shadow: 0 0 15px white;
}

/* score */
#score {
  text-align: center;
  color: white;
  font-size: 20px;
}

/* button */
button {
  padding: 15px 25px;
  border: none;
  border-radius: 30px;
  font-size: 18px;
  cursor: pointer;
}

#yes {
  display: block;
  margin: 30px auto;
  background: white;
  color: hotpink;
  box-shadow: 0 0 20px white;
}

#no {
  position: absolute;
  background: black;
  color: white;
}

/* hearts */
.heart {
  position: absolute;
  font-size: 24px;
  animation: fall 4s linear forwards;
}

@keyframes fall {
  from { transform: translateY(-50px); }
  to { transform: translateY(110vh); }
}
</style>
</head>

<body>

<h1>Neon Love Game 💖</h1>
<div id="score">Score: 0</div>

<button id="yes">YES 💕</button>
<button id="no">NO ❌</button>

<script>
let score = 0;

const noBtn = document.getElementById("no");

function moveNo() {
  noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 100) + "px";
}

noBtn.addEventListener("mouseover", moveNo);

document.getElementById("yes").onclick = () => {
  alert("AWWW BABEEE I LOVE YOU TO!!! 💖🐱✨");
};

/* hearts */
function spawnHeart() {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";

  h.style.left = Math.random() * window.innerWidth + "px";

  document.body.appendChild(h);

  setTimeout(() => h.remove(), 4000);
}

setInterval(spawnHeart, 200);
</script>

</body>
</html>
